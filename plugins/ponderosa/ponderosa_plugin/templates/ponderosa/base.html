<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ponderosa Production{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f8f9fa; color: #212529; line-height: 1.5;
        }
        .page-header {
            background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 24px;
            display: flex; align-items: center; gap: 16px;
        }
        .page-header h1 { font-size: 18px; font-weight: 600; color: #212529; }
        .page-header nav { display: flex; gap: 8px; margin-left: auto; }
        .page-header nav a {
            padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500;
            text-decoration: none; color: #495057; background: #f1f3f5; transition: background 0.15s;
        }
        .page-header nav a:hover { background: #e9ecef; }
        .page-header nav a.active { background: #228be6; color: #fff; }
        .page-content { padding: 24px; max-width: 1400px; margin: 0 auto; }
        .toolbar {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .toolbar select, .toolbar input, .toolbar button {
            padding: 6px 12px; border: 1px solid #ced4da; border-radius: 6px;
            font-size: 13px; background: #fff;
        }
        .toolbar button {
            background: #228be6; color: #fff; border: none; cursor: pointer; font-weight: 500;
        }
        .toolbar button:hover { background: #1c7ed6; }
        .toolbar button.secondary { background: #f1f3f5; color: #495057; border: 1px solid #ced4da; }
        .toolbar button.secondary:hover { background: #e9ecef; }
        .card {
            background: #fff; border: 1px solid #dee2e6; border-radius: 8px;
            padding: 16px; margin-bottom: 12px;
        }
        .card-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .card-title { font-size: 14px; font-weight: 600; color: #212529; }
        .card-meta { font-size: 12px; color: #868e96; }
        .card-body { font-size: 13px; color: #495057; }
        .card-actions { display: flex; gap: 6px; margin-top: 10px; }
        .card-actions button {
            padding: 4px 10px; border: 1px solid #ced4da; border-radius: 4px;
            font-size: 12px; cursor: pointer; background: #fff; color: #495057;
            font-weight: 500; transition: all 0.15s;
        }
        .card-actions button.primary { background: #228be6; color: #fff; border-color: #228be6; }
        .card-actions button.primary:hover { background: #1c7ed6; }
        .card-actions button.success { background: #2f9e44; color: #fff; border-color: #2f9e44; }
        .card-actions button.success:hover { background: #2b8a3e; }
        .card-actions button.danger { background: #e03131; color: #fff; border-color: #e03131; }
        .card-actions button.danger:hover { background: #c92a2a; }
        .card-actions button.warning { background: #e8590c; color: #fff; border-color: #e8590c; }
        .card-actions button.warning:hover { background: #d9480f; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; color: #fff;
        }
        .badge-step-type {
            padding: 2px 6px; border-radius: 3px; font-size: 11px;
            text-transform: capitalize;
        }
        .status-pending { background: #868e96; }
        .status-queued { background: #fab005; color: #212529; }
        .status-in_progress { background: #1971c2; }
        .status-completed { background: #2f9e44; }
        .status-on_hold { background: #e8590c; }
        .status-blocked { background: #e03131; }
        .status-skipped { background: #adb5bd; }
        .progress-bar-container {
            height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 4px; transition: width 0.3s;
        }
        .progress-stats {
            display: flex; gap: 12px; margin-top: 6px; font-size: 11px; color: #868e96;
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            vertical-align: middle; margin-right: 4px;
        }
        table {
            width: 100%; border-collapse: collapse; font-size: 13px;
            background: #fff; border: 1px solid #dee2e6; border-radius: 8px;
            overflow: hidden;
        }
        thead tr { background: #f8f9fa; border-bottom: 2px solid #dee2e6; }
        th { padding: 8px 12px; text-align: left; color: #495057; font-weight: 600; }
        td { padding: 8px 12px; border-bottom: 1px solid #f1f3f5; }
        .kanban { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; align-items: flex-start; }
        .kanban-column {
            min-width: 300px; max-width: 350px; flex-shrink: 0; background: #f1f3f5;
            border-radius: 8px; padding: 12px;
        }
        .kanban-column-header {
            font-size: 14px; font-weight: 600; color: #495057;
            padding-bottom: 8px; border-bottom: 2px solid #dee2e6; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .kanban-column-count {
            background: #dee2e6; color: #495057; padding: 2px 8px;
            border-radius: 10px; font-size: 11px; font-weight: 600;
        }
        .kanban-card {
            background: #fff; border: 1px solid #dee2e6; border-radius: 6px;
            padding: 10px; margin-bottom: 8px; cursor: grab;
            transition: box-shadow 0.15s, border-color 0.15s;
        }
        .kanban-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-color: #adb5bd; }
        .kanban-card.dragging { opacity: 0.5; }
        .kanban-column.drag-over { background: #d0ebff; border: 2px dashed #228be6; }
        .empty-state {
            text-align: center; padding: 40px 20px; color: #868e96; font-size: 14px;
        }
        .loading { text-align: center; padding: 40px; color: #868e96; }
        .detail-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }
        .detail-modal {
            background: #fff; border-radius: 12px; padding: 24px; max-width: 500px;
            width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .detail-modal h3 { margin-bottom: 16px; font-size: 16px; }
        .detail-modal .close-btn {
            float: right; background: none; border: none; font-size: 20px;
            cursor: pointer; color: #868e96; padding: 0; line-height: 1;
        }
        .detail-row {
            display: flex; justify-content: space-between; padding: 6px 0;
            border-bottom: 1px solid #f1f3f5; font-size: 13px;
        }
        .detail-row .label { color: #868e96; }
        .detail-row .value { font-weight: 500; }
        .pipeline { display: flex; align-items: center; gap: 4px; }
        .pipeline-step {
            width: 24px; height: 24px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 10px;
            font-weight: 700; color: #fff; cursor: pointer; transition: transform 0.15s;
            position: relative;
        }
        .pipeline-step:hover { transform: scale(1.2); }
        .pipeline-connector { width: 16px; height: 2px; background: #dee2e6; }
        @media (max-width: 768px) {
            .page-content { padding: 12px; }
            .kanban { flex-direction: column; }
            .kanban-column { min-width: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>{% block page_title %}Ponderosa{% endblock %}</h1>
        <nav>
            <a href="/plugin/ponderosa/station-queue/" id="nav-queue">Station Queue</a>
            <a href="/plugin/ponderosa/build-tracker/" id="nav-tracker">Build Tracker</a>
            <a href="/plugin/ponderosa/dispatch/" id="nav-dispatch">Dispatch Board</a>
        </nav>
    </div>
    <div class="page-content">
        {% block content %}{% endblock %}
    </div>
    <script>
        const BASE = '/plugin/ponderosa/';
        async function api(path, opts) {
            const url = BASE + path;
            const resp = await fetch(url, {
                headers: {'Content-Type': 'application/json', ...((opts && opts.headers) || {})},
                ...opts,
            });
            return resp.json();
        }
        function stepTypeBadge(st) {
            if (!st) return '';
            const bg = st.color || '#1971c2';
            return `<span class="badge-step-type" style="background:${bg}20;color:${bg};">${st.name}</span>`;
        }
        function statusBadge(status) {
            const label = (status || 'unknown').replace(/_/g, ' ');
            return `<span class="badge status-${status}">${label}</span>`;
        }
        function formatDate(iso) {
            if (!iso) return '\u2014';
            try { return new Date(iso).toLocaleDateString(); } catch { return iso; }
        }
        function formatDateTime(iso) {
            if (!iso) return '\u2014';
            try { return new Date(iso).toLocaleString(); } catch { return iso; }
        }

        // Set active nav link
        const path = window.location.pathname;
        document.querySelectorAll('.page-header nav a').forEach(a => {
            if (path === a.getAttribute('href')) a.classList.add('active');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
